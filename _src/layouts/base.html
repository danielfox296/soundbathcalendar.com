<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bing Webmaster Tools site verification (account-level code, same
       account as thefirstwater.co) -->
  <meta name="msvalidate.01" content="9C97AFC25A8EE199FF51C4C6D7C46F2E" />
  <link rel="canonical" href="{{canonical_url}}">
  <meta name="robots" content="{{robots}}">
  <title>{{title}}</title>
  {{meta_description}}
  <meta name="theme-color" content="#F5F7FA">

  <!-- Open Graph -->
  {{og_tags}}

  <!-- Twitter Card -->
  {{twitter_tags}}

  <!-- Structured Data -->
  {{schema_json}}

  <!-- Google tag (gtag.js) — Sound Bath Calendar's own GA4 property
       (G-LXTJV4R877, created 2026-07-19). Never reuse Firstwater's GA4 property. -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LXTJV4R877"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LXTJV4R877');
  </script>

  <link rel="icon" type="image/svg+xml" href="{{css_path}}img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap">
  <link rel="stylesheet" href="{{css_path}}styles.css">
  {{page_style}}
</head>
<body>
  {{header}}

  <main>
  {{content}}
  </main>

  {{footer}}

  <!-- Progressive-enhancement calendar filters (Track B B.5). The page is fully
       usable without it — it only reveals and wires the filter bar. -->
  <script defer src="{{css_path}}filters.js"></script>
</body>
</html>
