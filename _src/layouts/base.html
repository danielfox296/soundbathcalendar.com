<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="{{canonical_url}}">
  <meta name="robots" content="{{robots}}">
  <title>{{title}}</title>
  {{meta_description}}
  <meta name="theme-color" content="#F5F7FA">

  <!-- Open Graph -->
  {{og_tags}}

  <!-- Twitter Card -->
  {{twitter_tags}}

  <!-- Structured Data -->
  {{schema_json}}

  <!-- Analytics: Daniel-gated. This brand gets its OWN GA4 property — never
       reuse Firstwater's G-BEEHEWEEYC here. Once the new property exists,
       replace G-XXXXXXXXXX below and remove this comment wrapper:
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  -->

  <link rel="icon" type="image/svg+xml" href="{{css_path}}img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap">
  <link rel="stylesheet" href="{{css_path}}styles.css">
  {{page_style}}
</head>
<body>
  {{header}}

  <main>
  {{content}}
  </main>

  {{footer}}
</body>
</html>
