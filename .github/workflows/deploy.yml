name: Deploy Sound Bath Calendar

on:
  push:
    branches: [main]
  # The events service fires these when the calendar or Firstwater sessions
  # change, so the static site rebuilds with fresh rows without a code push:
  #   POST /repos/<owner>/<repo>/dispatches  {"event_type": "calendar-updated"}
  repository_dispatch:
    types: [calendar-updated, sessions-updated]
  # Daily rebuild so the temporal root rolls over — "Today"/"Tonight"/"This
  # weekend" are computed at build time, so a build each morning keeps them
  # true even on days with no feed change. 12:00 UTC = 06:00 MDT / 05:00 MST
  # (early Denver morning year-round; the 1h DST drift is immaterial for a
  # date rollover). Content pulls stay on the Mon/Thu service schedule.
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      post_social:
        description: 'Also publish the day carousel to Facebook + Instagram'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history: build.py derives evergreen pages' sitemap <lastmod>
          # from git (a shallow checkout would date every page at the deploy
          # commit — the daily cron would restamp the whole sitemap).
          fetch-depth: 0

      # BEFORE build/deploy — after the deploy the live sitemap already equals
      # the new one, so a post-deploy fetch would always diff empty. This
      # snapshot is what makes the changed-only IndexNow ping meaningful.
      - name: Snapshot live sitemap (IndexNow baseline)
        run: |
          curl -fsS --max-time 30 https://soundbathcalendar.com/sitemap.xml \
            -o /tmp/live-sitemap.xml \
            || echo "live sitemap unavailable — IndexNow will submit all URLs"

      # Pinned to the version ubuntu-latest already ships, so this changes
      # nothing about how build.py runs — it is here so the Pillow install in
      # the next-but-one step lands in a normal, writable environment rather
      # than a PEP 668 externally-managed system Python.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Build itself is stdlib-only.
      - name: Build site
        run: python3 build.py

      # The day's social carousel (CAL-25). Pillow is the ONE non-stdlib
      # dependency in this workflow and only this step needs it. Runs after
      # build.py so it reads the same freshly-fetched feed cache the site did.
      #
      # Today only: Meta ingests its own copy of every slide at publish time,
      # so the slides only have to be reachable during the post itself. The
      # kind is picked from the weekday — Thursday renders the Fri/Sat/Sun
      # weekend carousel instead of a daily one.
      #
      # This step fetches operator event images over the network. Every fetch
      # failure degrades to a type-only slide inside social.py rather than
      # raising, so a dead operator CDN can never fail a site deploy.
      - name: Render social carousel
        run: |
          python3 -m pip install --quiet --disable-pip-version-check Pillow
          python3 scripts/social.py

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '_site' --exclude '_src' --exclude '.git' --exclude '.github' \
            --exclude 'scripts' --exclude '__pycache__' --exclude 'build.py' \
            --exclude '*.md' ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # Tell IndexNow-participating engines (Bing, etc.) what changed — only
      # URLs that are new or whose lastmod moved vs the pre-deploy snapshot;
      # skips the ping entirely when nothing did (a no-op daily-cron rebuild
      # stays silent). The script swallows its own errors, so a dead endpoint
      # never fails a deploy.
      - name: Ping IndexNow (changed URLs only)
        run: python3 scripts/indexnow.py --baseline /tmp/live-sitemap.xml

      # Publish the day's carousel to the Facebook Page + Instagram (CAL-25).
      # AFTER the Pages deploy on purpose: Meta cURLs each slide rather than
      # accepting bytes, so they have to be live first — --require-live-image
      # polls every slide URL and refuses to publish until each serves a JPEG.
      #
      # Only on the daily cron, or a manual run that explicitly ticks the box.
      # The repository_dispatch trigger fires on EVERY event approval, and
      # posting on each of those would blast the feed a dozen times a day.
      #
      # No-ops safely when the secrets are unset (nothing published, step
      # passes), so this can merge before the Meta app exists. A red step here
      # means the token died or Meta rejected the post — that failure mail is
      # the whole monitoring story for this job.
      - name: Post the day carousel to Meta
        if: github.event_name == 'schedule' || inputs.post_social
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
        run: |
          if [ -z "$META_PAGE_TOKEN" ]; then
            echo "META_PAGE_TOKEN unset — social posting not configured yet."
            python3 scripts/post.py
            exit 0
          fi
          python3 scripts/post.py --live --require-live-image
