name: Deploy Sound Bath Calendar

on:
  push:
    branches: [main]
  # The events service fires these when the calendar or Firstwater sessions
  # change, so the static site rebuilds with fresh rows without a code push:
  #   POST /repos/<owner>/<repo>/dispatches  {"event_type": "calendar-updated"}
  repository_dispatch:
    types: [calendar-updated, sessions-updated]
  # Daily rebuild so the temporal root rolls over — "Today"/"Tonight"/"This
  # weekend" are computed at build time, so a build each morning keeps them
  # true even on days with no feed change. 12:00 UTC = 06:00 MDT / 05:00 MST
  # (early Denver morning year-round; the 1h DST drift is immaterial for a
  # date rollover). Content pulls stay on the Mon/Thu service schedule.
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build is stdlib-only Python — no pip install step needed.
      - name: Build site
        run: python3 build.py

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '_site' --exclude '_src' --exclude '.git' --exclude '.github' \
            --exclude 'scripts' --exclude '__pycache__' --exclude 'build.py' \
            --exclude '*.md' ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Tell IndexNow-participating engines (Bing, etc.) the site changed.
      # The script swallows its own errors, so a dead endpoint never fails a deploy.
      - name: Ping IndexNow
        run: python3 scripts/indexnow.py
